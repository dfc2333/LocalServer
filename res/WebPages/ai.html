<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ai</title>
    <script>
        // 页面加载完成后初始化MathJax
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
    <script id="MathJax-script" async src="/res/mathjax.js"></script>
    <script src="/res/markdown-it.js"></script>
    <link rel="stylesheet" href="/res/ai.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
            line-height: 1.6;
        }
        .math-container {
            margin: 20px 0;
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>AI</h1>
            <div class="money-display">
                <span class="money-label">账户余额:</span>
                <span id="money">加载中...</span>
            </div>
        </header>
        
        <div class="main-content">
            <div class="panel">
                <div class="panel-title">
                    <span>对话历史</span>
                    <button class="settings-toggle-btn" onclick="openSettings()">
                        设置
                    </button>
                </div>
                <div class="history-area" id="history"></div>
                
                <div class="divider"></div>
                
                <div class="input-group">
                    <label for="userinp">输入你的问题</label>
                    <input type="text" id="userinp" placeholder="输入你的问题..." onkeypress="if(event.keyCode==13) handle()">
                </div>
                <div class="button-group">
                    <button class="primary-btn" onclick="internethandle()">联网询问（仅vip可用）</button>
                    <button class="primary-btn" onclick="handle()">
                        发送消息
                    </button>
                </div>
            </div>
            
            <!-- 设置弹窗 -->
            <div class="popup-overlay" id="settingsOverlay" onclick="closeSettings()"></div>
            <div class="settings-popup" id="settingsPopup">
                <div class="popup-header">
                    <div class="popup-title">
                        <span class="status-indicator"></span> 对话设置
                    </div>
                    <button class="popup-close-btn" onclick="closeSettings()">&times;</button>
                </div>
                
                <div class="input-group">
                    <label for="sysprompt">系统提示词（角色设定，一个对话只能设置一次）</label>
                    <input type="text" id="sysprompt" value="你是一个AI助手，能够帮助用户解答问题、提供建议和进行对话。">
                </div>
                
                <div class="controls">
                    <div class="control-group">
                        <label for="model">选择AI模型</label>
                        <select id="model">
                            <option value="deepseek-chat">DeepSeek 通用模型</option>
                            <option value="deepseek-reasoner">DeepSeek 思考模型（仅限赞助者）</option>
                        </select>
                    </div>
                    
                    <div class="control-group">
                        <label for="temp">温度参数 (0.0-2.0)</label>
                        <input type="number" id="temp" min="0" max="2" step="0.1" value="1.3">
                    </div>
                </div>
                
                <div class="tip">
                    <p><strong>温度参数说明：</strong>控制模型输出的随机性。数字越大输出越随机。</p>
                    <p>推荐：数学计算用0.0，日常对话用1.3，文学创作可用1.5。（不建议使用2.0）</p>
                </div>
                
                <div class="divider"></div>
                
                <div class="button-group">
                    <button class="close-popup" onclick="closeSettings()">
                        关闭设置
                    </button>
                </div>
            </div>
            <!-- 修改对话内容弹窗 -->
            <div class="popup-overlay" id="editOverlay" onclick="exitEditing()"></div>
            <div class="settings-popup" id="editPopup">
                <div class="popup-header">
                    <div class="popup-title">
                        <span class="status-indicator"></span> 编辑消息
                    </div>
                    <button class="popup-close-btn" onclick="exitEditing()">&times;</button>
                </div>
                
                <div class="input-group">
                    <label for="sysprompt">系统提示词（角色设定，一个对话只能设置一次）</label>
                    <textarea id="msgContent"></textarea>
                </div>
                <div class="button-group">
                    <button class="close-popup" onclick="saveEditing()">
                        保存修改
                    </button>
                </div>
            </div>
            
            <!-- 设置摘要 -->
            <div class="settings-compact">
                <div class="settings-summary">
                    <div class="settings-info">
                        <div class="settings-label">当前设置</div>
                        <div class="settings-value" id="currentModel">DeepSeek 通用模型</div>
                        <div class="settings-value" id="currentTemp">温度: 1.3</div>
                    </div>
                    <button class="settings-toggle-btn" onclick="openSettings()">
                        修改设置
                    </button>
                </div>
                <div class="tip">
                    <p>点击"修改设置"调整AI模型、温度参数和系统提示词。
现在修改删除重试都不能用，只有停止能用</p>
                </div>
                <div class="input-group">
                    <label for="hisid">历史记录名称</label>
                    <input type="text" id="hisid" placeholder="给当前对话取一个名字，以便保存和读取">
                    <p style="margin-top: 8px; color: #718096; font-size: 0.9rem;">填写名称后对话将被保存，AI也会有对话记忆。但是！！思考内容将不保存</p>
                </div>
                <button class="secondary-btn" onclick="flashHistory()">
                        刷新历史
                    </button>
            </div>
        </div>
    </div>
    <script>
        // 初始化markdown-it解析器
        const md = window.markdownit({
            html: false,
            linkify: true,
            typographer: true,
            breaks: true
        });
        // 检查用户名
        async function getName() {
            try {
                const response = await fetch("/getname");
                if (!response.ok) {
                    throw new Error("获取用户名失败");
                }
                return await response.text();
            } catch (error) {
                console.error("获取用户名失败:", error);
                return '';
            }
            
        }
        
        // 获取用户输入
        function getUserInput() {
            return document.getElementById("userinp").value;
        }
        
        // 获取系统提示词
        function getSysPrompt() {
            return document.getElementById("sysprompt").value;
        }
        
        // 获取历史记录
        async function getHistory(id) {
            try {
                const response = await fetch("/api/history/" + id);
                return response;
            } catch (error) {
                console.error("获取历史记录失败:", error);
                return null;
            }
        }
        async function editHistory(){

        }
        // 获取AI回复
        async function getReply(search) {
            const userInput = getUserInput();
            const sysPrompt = getSysPrompt();
            const temp = document.getElementById("temp").value;
            const historyId = getHistoryid();
            const model = document.getElementById("model").value;
            
            try {
                requestBody =
                new Request('/api/get', {
                    method: 'post',
                    headers: {
                        'Content-Type': 'application/json;charset=utf-8;'
                    },
                    body: JSON.stringify({
                    "user": userInput, 
                    "system": sysPrompt, 
                    "temp": temp, 
                    "hisid": historyId, 
                    "model": model,
                    "search": search
                })
                })
                const response = await fetch(requestBody)
                return response;
            } catch (error) {
                console.error("获取AI回复失败:", error);
                return '';
            }
        }
        
        // 渲染Markdown和LaTeX内容
        function renderContent(text) {
            function escapeBackslashes(str) {
  return str.replace(/(```[\s\S]*?```|\\\\)|\\/g, function(match, codeBlock) {
    // 如果匹配到的是整个代码块，原样返回
    if (codeBlock) return match;
    // 否则是代码块外的单个反斜线，替换为双反斜线
    return '\\\\';
  });
}
            text = escapeBackslashes(text);
            console.log(text)
            // 使用markdown-it解析Markdown
            let html = md.render(text);
            
            // 返回HTML，MathJax会自动处理其中的LaTeX公式
            return html;
        }
        
        // 刷新历史记录显示
        async function flashHistory() {
            const historyId = getHistoryid();
            if (!historyId) {
                alert("请先输入历史记录名称");
                return;
            }
            
            try {
                const historyResponse = await getHistory(historyId);
                if (!historyResponse || !historyResponse.ok) {
                    alert("获取历史记录出错");
                    return;
                }
                
                historyData = await historyResponse.json();
                const historyElement = document.getElementById('history');
                historyElement.innerHTML = '';
                
                if (!historyData || historyData.length === 0) {
                    historyElement.innerHTML = '<div class="history-placeholder">该历史记录中没有对话内容</div>';
                    return;
                }
                
                rendermessages(historyData, historyElement);
                
            } catch (error) {
                console.error("刷新历史记录失败:", error);
                alert("读取历史记录时发生错误");
            }
        }
        function rendermessages(historyData, historyElement){
                    historyData.forEach(item => {
                    let messageElement = document.createElement('div');
                    if (item.role === 'user') {
                        messageElement.className = 'user-message';
                        messageElement.innerHTML = `
                        <div class="message-header">用户:
                            <div style="margin-left:auto; display:flex; flex-direction:row; ">
                                <button class="msgButton" onclick="retryMessage(${item.id})">重试</button>
                                <button class="msgButton" onclick="deleteMessage(this, ${item.id})">删除</button>
                                <button class="msgButton" onclick="editMessage(this, ${item.id})">编辑</button>
                            </div>
                        </div>
                        <div class="message-content">${renderContent(item.content)}</div>
                    `;
                    } else if (item.role === 'assistant') {
                        messageElement.className = 'assistant-message';
                        messageElement.innerHTML = `
                            <div class="message-header">AI助手:
                                <div style="margin-left:auto; display:flex; flex-direction:row; ">
                                    <button class="msgButton" onclick="retryMessage(${item.id})">重试</button>
                                    <button class="msgButton" onclick="deleteMessage(this, ${item.id})">删除</button>
                                    <button class="msgButton" onclick="editMessage(this, ${item.id})">编辑</button>
                                </div>
                            </div>
                            <div class="message-content">${renderContent(item.content)}</div>
                        `;
                    } else if (item.role === 'system') {
                        // 系统消息不显示
                        return;
                    }
                    historyElement.appendChild(messageElement);
                });
                
                // 滚动到底部
                historyElement.scrollTop = historyElement.scrollHeight;
                
                // 重新渲染数学公式
                MathJax.typesetPromise();}

        currentStreamController = null;
        // 处理用户请求
        async function handle(isinternet) {
            const userInput = getUserInput();
            if (!userInput) {
                alert("请输入问题内容");
                return;
            }
            
            const historyElement = document.getElementById('history');
            
            // 清除占位符
            if (historyElement.querySelector('.history-placeholder')) {
                historyElement.innerHTML = '';
            }

            // 显示用户消息
            const userMessageElement = document.createElement('div');
            userMessageElement.className = 'user-message';
            userMessageElement.innerHTML = `
                <div class="message-header">用户:
                    <div style="margin-left:auto; display:flex; flex-direction:row; ">
                        <button class="msgButton" onclick="retryMessage(this)">重试</button>
                        <button class="msgButton" onclick="deleteMessage(this)">删除</button>
                        <button class="msgButton" onclick="editMessage(this)">编辑</button>
                    </div>
                </div>
                <div class="message-content">${renderContent(userInput)}</div>
            `;
            historyElement.appendChild(userMessageElement);
            
            // 显示加载状态
            const loadingElement = document.createElement('div');
            loadingElement.className = 'assistant-message';
            loadingElement.innerHTML = `
                <div class="message-header">AI助手:
                    <div style="margin-left:auto; display:flex; flex-direction:row; ">
                        <button class="msgButton" onclick="retryMessage(this)">重试</button>
                        <button class="msgButton" onclick="deleteMessage(this)">删除</button>
                        <button class="msgButton" onclick="editMessage(this)">编辑</button>
                        <button class="msgButton" onclick="stopStream()">停止</button>
                    </div>
                </div>
                <div class="message-content">思考中...</div>
            `;
            historyElement.appendChild(loadingElement);
            
            // 滚动到底部
            historyElement.scrollTop = historyElement.scrollHeight;
            // 如果有正在进行的请求，先停止（可选，根据需求决定）
            if (currentStreamController) {
                currentStreamController.abort();
            }

            currentStreamController = new AbortController();
            const signal = currentStreamController.signal;
            const sysPrompt = getSysPrompt();
            const temp = document.getElementById("temp").value;
            const historyId = getHistoryid();
            const model = document.getElementById("model").value;
            // 准备请求数据（假设这些变量已在外部定义）
            const requestData = {
                    "user": userInput, 
                    "system": sysPrompt, 
                    "temp": temp, 
                    "hisid": historyId, 
                    "model": model,
                    "search": isinternet
                };

            try {
                // 发起流式请求
                const response = await fetch('/api/get', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData),
                    signal: signal
                });

                if (!response.ok) {
                    // 尝试读取错误信息
                    const errorText = await response.text();
                    loadingElement.innerHTML = `
                        <div class="message-header">AI助手:
                    <div style="margin-left:auto; display:flex; flex-direction:row; ">
                        <button class="msgButton" onclick="retryMessage(this)">重试</button>
                        <button class="msgButton" onclick="deleteMessage(this)">删除</button>
                        <button class="msgButton" onclick="editMessage(this)">编辑</button>
                        <button class="msgButton" onclick="stopStream()">停止</button>
                    </div>
                </div>
                        <div class="message-content">获取回复失败，状态码：${response.status}<br>${errorText}</div>
                    `;
                    throw new Error(`请求失败 (${response.status})`);
                }

                // 初始化显示区域（清空“思考中”）
                loadingElement.innerHTML = `
                    <div class="message-header">AI助手:
                    <div style="margin-left:auto; display:flex; flex-direction:row; ">
                        <button class="msgButton" onclick="retryMessage(this)">重试</button>
                        <button class="msgButton" onclick="deleteMessage(this)">删除</button>
                        <button class="msgButton" onclick="editMessage(this)">编辑</button>
                        <button class="msgButton" onclick="stopStream()">停止</button>
                    </div>
                </div>
                    <div class="message-content"></div>
                `;
                const contentDiv = loadingElement.querySelector('.message-content');
                let receivedText = '';

                // 读取流式数据
                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    // 解码数据块
                    const chunk = decoder.decode(value, { stream: true });
                    receivedText += chunk;
                    // 实时渲染（支持 Markdown 等）
                    contentDiv.innerHTML = renderContent(receivedText);
                }

                // 流式结束，更新余额（原来在获取回复后调用的逻辑）
                await updateMoney();

            } catch (error) {
                // 处理取消错误
                if (error.name === 'AbortError') {
                    console.log('用户停止了生成');
                    // 可选：在内容区显示停止提示
                    if (loadingElement && loadingElement.innerHTML.includes('思考中')) {
                        loadingElement.innerHTML = `
                            <div class="message-header">AI助手:
                    <div style="margin-left:auto; display:flex; flex-direction:row; ">
                        <button class="msgButton" onclick="retryMessage(this)">重试</button>
                        <button class="msgButton" onclick="deleteMessage(this)">删除</button>
                        <button class="msgButton" onclick="editMessage(this)">编辑</button>
                        <button class="msgButton" onclick="stopStream()">停止</button>
                    </div>
                </div>
                            <div class="message-content">生成已停止。</div>
                        `;
                    } else {
                        // 如果已经有内容，追加停止提示（不覆盖已有内容）
                        const contentDiv = loadingElement.querySelector('.message-content');
                        if (contentDiv) {
                            contentDiv.innerHTML += '<div style="color: gray;">\n\n[生成已停止]</div>';
                        } else {
                            loadingElement.innerHTML = `
                                <div class="message-header">AI助手:
                    <div style="margin-left:auto; display:flex; flex-direction:row; ">
                        <button class="msgButton" onclick="retryMessage(this)">重试</button>
                        <button class="msgButton" onclick="deleteMessage(this)">删除</button>
                        <button class="msgButton" onclick="editMessage(this)">编辑</button>
                        <button class="msgButton" onclick="stopStream()">停止</button>
                    </div>
                </div>
                                <div class="message-content">生成已停止。</div>
                            `;
                        }
                    }
                } else {
                    console.error('处理请求失败:', error);
                    // 原有的错误处理逻辑
                    if (loadingElement.innerHTML.includes('思考中')) {
                        loadingElement.innerHTML = `
                            <div class="message-header">AI助手:
                    <div style="margin-left:auto; display:flex; flex-direction:row; ">
                        <button class="msgButton" onclick="retryMessage(this)">重试</button>
                        <button class="msgButton" onclick="deleteMessage(this)">删除</button>
                        <button class="msgButton" onclick="editMessage(this)">编辑</button>
                        <button class="msgButton" onclick="stopStream()">停止</button>
                    </div>
                </div>
                            <div class="message-content">请求处理失败，错误: ${error.message}</div>
                        `;
                    } else {
                        // 已有内容时，追加错误提示
                        const contentDiv = loadingElement.querySelector('.message-content');
                        if (contentDiv) {
                            contentDiv.innerHTML += `<div style="color: red;">\n\n[错误: ${error.message}]</div>`;
                        }
                    }
                }
            } finally {
                // 清空当前控制器，允许下一次请求
                currentStreamController = null;
            }
}

// 停止生成的函数，供按钮调用
function stopStream() {
    if (currentStreamController) {
        currentStreamController.abort();
    }


            // 重新渲染数学公式
            MathJax.typesetPromise();
            
            // 滚动到底部
            historyElement.scrollTop = historyElement.scrollHeight;
        }
        
        // 获取历史记录ID
        function getHistoryid() {
            return document.getElementById('hisid').value.trim();
        }
        
        // 获取余额
        async function getMoney() {
            try {
                const response = await fetch("/api/getmoney?username=" + encodeURIComponent(await getName()));
                if (!response.ok) {
                    throw new Error("获取余额失败");
                }
                return await response.text();
            } catch (error) {
                console.error("获取余额失败:", error);
                return "获取失败，你可能还没用过";
            }
        }
        
        // 更新余额显示
        async function updateMoney() {
            try {
                const money = await getMoney();
                document.getElementById("money").textContent = money;
            } catch (error) {
                console.error("更新余额显示失败:", error);
            }
        }
        
        // 打开设置弹窗
        function openSettings() {
            document.getElementById('settingsPopup').classList.add('active');
            document.getElementById('settingsOverlay').classList.add('active');
        }
        
        // 关闭设置弹窗
        function closeSettings() {
            document.getElementById('settingsPopup').classList.remove('active');
            document.getElementById('settingsOverlay').classList.remove('active');
            
            // 更新设置摘要
            updateSettingsSummary();
        }
        // 打开编辑弹窗
        function openEditing() {
            document.getElementById('editPopup').classList.add('active');
            document.getElementById('editOverlay').classList.add('active');
        }
        
        // 关闭编辑弹窗
        function exitEditing() {
            document.getElementById('editPopup').classList.remove('active');
            document.getElementById('editOverlay').classList.remove('active');
        }
        
        // 更新设置摘要
        function updateSettingsSummary() {
            const modelSelect = document.getElementById('model');
            const modelText = modelSelect.options[modelSelect.selectedIndex].text;
            const tempValue = document.getElementById('temp').value;
            
            document.getElementById('currentModel').textContent = modelText;
            document.getElementById('currentTemp').textContent = `温度: ${tempValue}`;
        }
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            updateMoney();
            updateSettingsSummary();
            
            // 初始化历史记录区域
            const historyElement = document.getElementById('history');
            historyElement.innerHTML = '<div class="history-placeholder">对话历史将在这里显示<br>开始对话或加载历史记录以查看内容</div>';
            
            // 添加示例提示
            const userInputElement = document.getElementById('userinp');
            userInputElement.placeholder = "输入你的问题...";
            
            // 渲染数学公式
            MathJax.startup.promise.then(() => {
    // 现在 MathJax 已完全初始化，可以安全调用其所有方法
    console.log('MathJax 已就绪，正在排版...');
    MathJax.typesetPromise();
}).catch((err) => {
    console.error('MathJax 初始化失败:', err);
});
        });
        
        // 监听设置变化
        document.getElementById('model').addEventListener('change', updateSettingsSummary);
        document.getElementById('temp').addEventListener('change', updateSettingsSummary);
        //网络ai：）
        function internethandle(){
        handle(true)
        }
    </script>
</body>
</html>
