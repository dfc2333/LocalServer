<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/res/ai.css">
    <script src="/res/socket.js"></script>
    <style>
        /* 基础重置与全局样式 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .talk-container {
            max-width: 1400px;
            width: 95%;
            height: 95vh;
            margin: 0 auto;
            padding: 10px;
            background: transparent;
        }

        .talk-layout {
            display: flex;
            gap: 12px;
            height: 100%;
        }

        /* 左侧私聊列表 */
        .left-column {
            flex: 0 0 260px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 16px 10px;
        }

        /* 中间聊天区域 */
        .middle-column {
            flex: 1;
            min-width: 460px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: 100%;
        }

        /* 右侧状态面板 */
        .right-column {
            flex: 0 0 300px;
            background: transparent;
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: 100%;
            overflow-y: auto;
        }

        /* 通用卡片样式 */
        .panel-card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(226, 232, 240, 0.6);
        }

        .panel-header {
            font-size: 1rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            border-bottom: 1.5px solid #eef2f6;
            padding-bottom: 10px;
        }

        .panel-header i {
            font-size: 1.2rem;
        }

        /* 左侧私聊列表专用 */
        .left-column .header {
            text-align: left;
            margin-bottom: 18px;
            padding: 0 4px;
        }

        .left-column .header h1 {
            font-size: 1.6rem;
            font-weight: 600;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .left-column .header .subtitle {
            font-size: 0.8rem;
            color: #64748b;
        }

        .private-chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-top: 8px;
        }

        .private-chat-panel h3 {
            font-size: 0.95rem;
            color: #334155;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
        }

        .private-chat-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 12px;
            border-radius: 14px;
            background: #f8fafc;
            padding: 8px 4px;
        }

        .private-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            margin-bottom: 4px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            border: 1px solid #edf2f7;
            transition: all 0.2s;
            cursor: pointer;
        }

        .private-item:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }

        .private-name {
            font-weight: 500;
            color: #1e293b;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .private-name::before {
            content: "👤";
            font-size: 0.9rem;
            opacity: 0.7;
        }

        /* 小红点样式 */
        .little-red-spot {
            width: 8px;
            height: 8px;
            background-color: #f56565;
            border-radius: 50%;
            display: inline-block;
            margin-left: 6px;
        }

        .private-delete {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.2rem;
            line-height: 1;
            cursor: pointer;
            padding: 0 4px;
            border-radius: 20px;
            transition: 0.2s;
        }

        .private-delete:hover {
            color: #ef4444;
            background: #fee2e2;
        }

        .clear-chats-btn {
            width: 100%;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            color: #475569;
            padding: 8px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .clear-chats-btn:hover {
            background: #e2e8f0;
            color: #1e293b;
        }

        /* 中间消息面板 */
        .messages-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 24px;
            padding: 16px 16px 8px 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
            overflow: hidden;
        }

        .messages-panel h3 {
            margin: 0 0 12px 4px;
            font-size: 1rem;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .messages-panel-inner {
            flex: 1;
            overflow-y: auto;
            background: #f8fafc;
            border-radius: 18px;
            padding: 16px;
            border: 1px solid #eef2f6;
        }

        #MsgBox {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* 输入面板 */
        .input-panel {
            background: white;
            border-radius: 24px;
            padding: 18px 18px;
        }

        .input-group {
            margin-bottom: 14px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: #475569;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 30px;
            font-size: 0.9rem;
            transition: 0.2s;
            background: #f8fafc;
        }

        .input-group input:focus {
            outline: none;
            border-color: #3b82f6;
            background: white;
        }

        .button-row {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .primary-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            flex: 1;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(59,130,246,0.3);
        }

        .primary-btn:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .secondary-btn {
            background: white;
            color: #334155;
            border: 1.5px solid #e2e8f0;
            padding: 4px 6px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
        }

        .secondary-btn:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
        }

        /* 右侧状态卡片 */
        .status-bar {
            background: #f8fafc;
            border-radius: 18px;
            padding: 16px;
            border: 1px solid #eef2f6;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #f56565;
        }

        .status-indicator.connected {
            background-color: #48bb78;
        }

        .announcement-panel, .control-panel, .tip-panel {
            background: white;
            border-radius: 20px;
            padding: 16px;
        }

        #ann {
            background: #fef9e7;
            border-radius: 16px;
            padding: 12px;
            font-size: 0.9rem;
            border-left: 4px solid #f59e0b;
        }

        .control-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-buttons > div {
            display: flex;
            gap: 8px;
        }

        .tip {
            background: #f0f9ff;
            border-radius: 16px;
            padding: 14px;
            font-size: 0.85rem;
            color: #0c4a6e;
            line-height: 1.6;
        }

        .error-message, .success-message {
            padding: 12px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            display: none;
            margin-bottom: 8px;
        }
        .error-message { background: #fee2e2; color: #b91c1c; border-left: 4px solid #ef4444; }
        .success-message { background: #dcfce7; color: #166534; border-left: 4px solid #22c55e; }

        /* 消息样式优化 */
        .message {
            position: relative;
            padding: 12px 16px;
            border-radius: 20px;
            max-width: 85%;
            word-wrap: break-word;
        }
        .user-message {
            background: #dbeafe;
            align-self: flex-end;
            border-bottom-right-radius: 0px;
            margin-left: auto;
        }
        .other-message {
            background: #f1f3f5;
            align-self: flex-start;
            border-bottom-left-radius: 0px;
        }
        .system-message {
            background: #fff3cd;
            align-self: center;
            font-style: italic;
            color: #856404;
        }
        .message-header {
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
        }
        .message-time {
            font-size: 0.7rem;
            color: #6c757d;
            margin: 4px 0;
        }
        .delete-btn {
            background: #f43f5e;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
            top: 8px;
            right: 8px;
        }
        #end { height: 1px; }
    </style>
</head>
<body>
<div class='container talk-container'>
    <div class='talk-layout'>

        <!-- 左侧：私聊列表 + header -->
        <div class='left-column'>
            <div class='header'>
                <h1>Talk</h1>
            </div>
            <div class='private-chat-panel'>
                <h3>最近聊天</h3>
                <div id="privateChatList" class="private-chat-list">
                    <!-- 动态渲染私聊项 -->
                </div>
                <button id="clearPrivateChats" class="clear-chats-btn">清空记录</button>
            </div>
        </div>

        <!-- 中间：聊天核心区 -->
        <div class='middle-column'>
            <!-- 消息面板 -->
            <div class='messages-panel'>
                <div class='messages-panel-inner'>
                    <div id='MsgBox'></div>
                    <div id='end'></div>
                </div>
            </div>

            <!-- 输入面板 -->
            <div class='input-panel' style="display: flex;">
                    <input type='text' id='content' placeholder='输入要发送的消息...' style='flex: 10'>
                    <input type='text' id='key' placeholder='密钥' style='flex: 2;'>
                    <button id='sendButton' class='primary-btn' style="flex: 1;">发送</button>
            </div>
        </div>

        <!-- 右侧：状态、公告、控制、提示 -->
        <div class='right-column'>
            <div id='errorMessage' class='error-message'></div>
            <div id='successMessage' class='success-message'></div>

            <!-- 状态卡片 -->
            <div class='panel-card'>
                <div class='panel-header'>📡 连接状态</div>
                <div class='status-bar'>
                    <div class='status-item'>
                        <div id='status' class='status-indicator'></div>
                        <span id='statusText'>未连接</span>
                    </div>
                    <div class='status-item' id='usernameDisplay'>用户: <a href="/login" style="color:blue;">点击设置</a></div>
                    <div class='status-item' id='roomInfo'>房间: 未加入</div>
                </div>
            </div>

            <!-- 公告卡片 -->
            <div class='panel-card'>
                <div class='panel-header'>📢 公告</div>
                <div id='ann'></div>
            </div>

            <!-- 控制卡片 -->
            <div class='panel-card'>
                <div class='panel-header'>⚙️ 操作</div>
                <div class='control-buttons'>
                    <div>
                        <button id='joinButton' class='secondary-btn'>➕ 加入聊天</button>
                        <div style='flex: 2;'>
                            <input type='text' id='user' placeholder='用户名 或 @群聊名 (留空公共聊天)'>
                        </div>
                    </div>
                    <div>
                        <button id='createGroupButton' class='secondary-btn'>创建群聊</button>
                        <button id='refreshButton' class='secondary-btn'>刷新消息</button>
                    </div>
                </div>
            </div>

            <!-- 提示卡片 -->
            <div class='panel-card'>
                <div class='panel-header'>💡 提示</div>
                <div class='tip'>
                    <p>1. 先在<a href='/login' target='_blank' style='color:#2563eb;'>登录页</a>设置用户名</p>
                    <p>2. 点击"加入聊天"进入对话</p>
                    <p>3. 私聊：输入对方用户名</p>
                    <p>4. 群聊：输入 @群聊名 (如 @技术群)</p>
                    <p>5. 群聊需要访问密钥</p>
                    <p>6. 点击左侧私聊项快速切换</p>
                    <p>7. 自己消息可撤回</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // --- 原有全局变量 ---
        let socket = null;
        let currentUsername = '';
        let currentTarget = '';
        let currentKey = 'default';
        let currentRoom = '';
        let messages = []; // Store messages with indices for deletion

        let privateChatList = []; // 存储对象 { name, redSpotStatus }
        const STORAGE_KEY = 'privateChatNames';

        // --- 加载私聊列表（兼容旧版字符串数组）---
        function loadPrivateChats() {
            try {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    const parsed = JSON.parse(stored);
                    if (Array.isArray(parsed)) {
                        // 如果是字符串数组，转换为对象数组
                        if (parsed.length > 0 && typeof parsed[0] === 'string') {
                            privateChatList = parsed.map(name => ({ name, redSpotStatus: false }));
                        } else {
                            // 已经是对象数组，确保每个对象都有 redSpotStatus 字段
                            privateChatList = parsed.map(item => {
                                if (typeof item === 'object' && item !== null) {
                                    return { name: item.name, redSpotStatus: item.redSpotStatus || false };
                                } else {
                                    return { name: String(item), redSpotStatus: false };
                                }
                            });
                        }
                    } else {
                        privateChatList = [];
                    }
                } else {
                    privateChatList = [];
                }
            } catch (e) {
                console.warn('读取私聊记录失败', e);
                privateChatList = [];
            }
            // 去重
            privateChatList = privateChatList.filter((item, index, self) => 
                index === self.findIndex(t => t.name === item.name)
            );
            renderPrivateChatList();
        }

        // --- 保存私聊列表到 localStorage ---
        function savePrivateChats() {
            try {
                // 去重并保留最近20条
                privateChatList = privateChatList.filter((item, index, self) => 
                    index === self.findIndex(t => t.name === item.name)
                ).slice(0, 20);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(privateChatList));
            } catch (e) {}
            renderPrivateChatList();
        }

        // --- 添加一个私聊名字 (去重并移到最前) ---
        function addToPrivateChatList(name) {
            if (!name || typeof name !== 'string') return;
            if (name === '') return;

            // 移除已存在的同名项
            privateChatList = privateChatList.filter(item => item.name !== name);
            // 插入到开头，红点状态默认为 false（新添加的项没有未读消息）
            privateChatList.unshift({ name, redSpotStatus: false });
            savePrivateChats();
        }

        // --- 从列表中移除指定名字 ---
        function removeFromPrivateChatList(chat) {
            const name = typeof chat === 'string' ? chat : chat.name;
            privateChatList = privateChatList.filter(item => item.name !== name);
            savePrivateChats();
        }

        // --- 清空所有私聊记录 ---
        function clearPrivateChats() {
            privateChatList = [];
            savePrivateChats();
        }

        // --- 设置指定聊天的红点状态 ---
        function setRedSpot(chat, hasRedSpot) {
            const name = typeof chat === 'string' ? chat : chat.name;
            const item = privateChatList.find(i => i.name === name);
            if (item) {
                item.redSpotStatus = hasRedSpot;
                renderPrivateChatList();
            }
        }

        // --- 渲染私聊列表UI ---
        function renderPrivateChatList() {
            const container = document.getElementById('privateChatList');
            if (!container) return;
            container.innerHTML = '';
            if (privateChatList.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#94a3b8; padding:20px;">暂无私聊记录</div>';
                return;
            }
            privateChatList.forEach(chat => {
                const item = document.createElement('div');
                item.className = 'private-item';

                const nameSpan = document.createElement('span');
                nameSpan.className = 'private-name';
                nameSpan.textContent = chat.name;

                // 小红点
                if (chat.redSpotStatus) {
                    const spot = document.createElement('span');
                    spot.className = 'little-red-spot';
                    nameSpan.appendChild(spot);
                }

                const delBtn = document.createElement('span');
                delBtn.className = 'private-delete';
                delBtn.innerHTML = '✕';
                delBtn.title = '从列表中移除';
                delBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    removeFromPrivateChatList(chat);
                });

                item.appendChild(nameSpan);
                item.appendChild(delBtn);

                // 点击整个项：填充输入框并自动加入聊天，同时清除小红点
                item.addEventListener('click', () => {
                    document.getElementById('user').value = chat.name;
                    // 清除小红点
                    setRedSpot(chat, false);
                    joinCurrentChat();  // 调用原有的加入函数
                });

                container.appendChild(item);
            });
        }

        // --- 初始化 ---
        document.addEventListener('DOMContentLoaded', function() {
            loadPrivateChats();
            document.getElementById('clearPrivateChats').addEventListener('click', () => {
                if (confirm('清空所有私聊记录？')) {
                    clearPrivateChats();
                }
            });
            initializeConnection();
            setupEventListeners();
            loadAnnouncement();
        });

        function initializeConnection() {
            socket = io();

            socket.on('connect', function() {
                console.log('Connected');
                const statusElement = document.getElementById('status');
                const statusTextElement = document.getElementById('statusText');
                statusElement.classList.add('connected');
                statusTextElement.textContent = '已连接';
                statusTextElement.style.color = '#48bb78';
            });

            socket.on('connected', function(data) {
                if (data.username) {
                    currentUsername = data.username;
                    document.getElementById('usernameDisplay').textContent = `用户: ${currentUsername}`;
                    // 自动加入公共聊天（可选）
                    // joinCurrentChat();
                }
            });

            socket.on('disconnect', function() {
                const statusElement = document.getElementById('status');
                const statusTextElement = document.getElementById('statusText');
                statusElement.classList.remove('connected');
                statusTextElement.textContent = '未连接';
                statusTextElement.style.color = '#f56565';
            });

            socket.on('joined', function(data) {
                console.log('Joined room:', data);
                currentRoom = data.room;
                document.getElementById('roomInfo').textContent = `房间: ${data.target || '公共聊天'}`;

                if (data.username) {
                    currentUsername = data.username;
                    document.getElementById('usernameDisplay').textContent = `用户: ${currentUsername}`;
                }
                // 加入成功后，将当前目标添加到私聊列表（但不带红点）
                if (data.target) {
                    addToPrivateChatList(data.target);
                }
            });

            socket.on('left', function(data) {
                if (currentRoom === data.room) {
                    currentRoom = '';
                    document.getElementById('roomInfo').textContent = '房间: 未加入';
                }
            });

            socket.on('message_history', function(data) {
                messages = data.messages;
                renderMessages(messages);
            });

            socket.on('new_message', function(data) {
                // 仅当消息的目标与当前正在查看的目标一致时才显示
                if (data.target === currentTarget) {
                    messages.push(data.message);
                    addMessageToUI(data.message);
                } else {
                // 其他聊天的消息只触发小红点，不显示内容
                console.log('收到其他聊天的消息，已忽略显示', data.target);
                }
            });

            socket.on('message_deleted', function(data) {
                removeMessageFromUI(data.index);
                if (data.index >= 0 && data.index < messages.length) {
                    messages.splice(data.index, 1);
                    for (let i = 0; i < messages.length; i++) {
                        messages[i].id = i;
                    }
                }
            });

            socket.on('error', function(data) {
                showError(data.message);
            });

            socket.on('message_sent', function(data) {
                document.getElementById('content').value = '';
            });

            socket.on('delete_success', function(data) {});

            socket.on('group_created', function(data) {
                const accessKey = data.access_key || '无密钥';
                alert(`群聊 "${data.group_name}" 创建成功！\n访问密钥: ${accessKey}\n\n请记下此密钥，其他人需要此密钥才能加入群聊。`);
            });

            // --- 新增：处理其他用户发来的新消息通知（小红点）---
            socket.on('other_new_message', function(data) {
                // data.target 可能是用户名（私聊）或 @群名（群聊）
                const target = data.target;
                if (!target) return;

                // 查找是否已存在于私聊列表
                const existing = privateChatList.find(item => item.name === target);
                if (existing) {
                    // 已存在，设置红点为 true
                    existing.redSpotStatus = true;
                } else {
                    // 不存在，添加新项并设置红点
                    privateChatList.unshift({ name: target, redSpotStatus: true });
                    // 限制长度
                    if (privateChatList.length > 20) privateChatList.pop();
                }
                // 保存并重新渲染
                savePrivateChats();  // save 中会调用 render
            });
        }

        function setupEventListeners() {
            document.getElementById('sendButton').addEventListener('click', sendMessage);
            document.getElementById('content').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') sendMessage();
            });
            document.getElementById('refreshButton').addEventListener('click', function() {
                if (currentRoom) joinCurrentChat();
            });
            document.getElementById('joinButton').addEventListener('click', joinCurrentChat);
            document.getElementById('createGroupButton').addEventListener('click', createGroup);
        }

        function joinCurrentChat() {
            if (!socket.connected) { showError('未连接到服务器'); return; }

            currentTarget = document.getElementById('user').value.trim();
            currentKey = document.getElementById('key').value.trim() || 'default';

            if (currentTarget && currentTarget.startsWith('@')) {
                const groupName = currentTarget.substring(1);
                const groupKey = prompt(`请输入群聊 "${groupName}" 的访问密钥：`, '');
                if (groupKey === null) return;

                messages = [];
                document.getElementById('MsgBox').innerHTML = '';

                socket.emit('join', {
                    target: currentTarget,
                    key: currentKey,
                    group_key: groupKey
                });
            } else {
                messages = [];
                document.getElementById('MsgBox').innerHTML = '';
                socket.emit('join', {
                    target: currentTarget,
                    key: currentKey
                });
            }
        }

        function sendMessage() {
            if (!socket.connected) { showError('未连接到服务器'); return; }
            if (!currentRoom) { showError('请先加入一个聊天'); return; }

            const content = document.getElementById('content').value.trim();
            if (!content) { showError('消息内容不能为空'); return; }

            socket.emit('send_message', {
                content: content,
                target: currentTarget,
                key: currentKey
            });
        }

        function createGroup() {
            if (!socket.connected) { showError('未连接到服务器'); return; }
            const groupName = prompt('请输入群聊名称:', '');
            if (!groupName) return;
            const accessKey = prompt('请输入访问密钥（可选，留空自动生成）:', '');
            const groupKey = accessKey === null ? '' : accessKey;

            socket.emit('create_group', { name: groupName, access_key: groupKey });
        }

        function deleteMessage(index) {
            if (!socket.connected) { showError('未连接到服务器'); return; }
            if (!currentRoom) { showError('请先加入一个聊天'); return; }
            if (index < 0 || index >= messages.length) { showError('无效的消息索引'); return; }
            socket.emit('delete_message', { target: currentTarget, key: currentKey, index: index });
        }

        function renderMessages(msgArray) {
            const container = document.getElementById('MsgBox');
            container.innerHTML = '';
            msgArray.forEach((msg, index) => container.appendChild(createMessageElement(msg, index)));
            document.getElementById('end')?.scrollIntoView({ behavior: 'smooth' });
        }

        function addMessageToUI(message) {
            const container = document.getElementById('MsgBox');
            container.appendChild(createMessageElement(message, messages.length - 1));
            document.getElementById('end')?.scrollIntoView({ behavior: 'smooth' });
        }

        function removeMessageFromUI(index) {
            const container = document.getElementById('MsgBox');
            const msgEl = container.querySelector(`[data-index="${index}"]`);
            if (msgEl) {
                msgEl.style.transition = 'opacity 0.3s';
                msgEl.style.opacity = '0';
                setTimeout(() => {
                    msgEl.remove();
                    renderMessages(messages);
                }, 300);
            }
        }

        function createMessageElement(message, index) {
            const box = document.createElement('div');
            box.className = 'message';
            box.setAttribute('data-index', index);

            if (message.sender === currentUsername) {
                box.classList.add('user-message');
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn';
                deleteBtn.textContent = '撤回';
                deleteBtn.onclick = () => deleteMessage(index);
                box.appendChild(deleteBtn);
            } else if (message.sender === 'system') {
                box.classList.add('system-message');
            } else {
                box.classList.add('other-message');
            }

            const sender = document.createElement('div');
            sender.className = 'message-header';
            sender.textContent = `${message.sender}`;

            const time = document.createElement('div');
            time.className = 'message-time';
            time.textContent = message.time;

            const content = document.createElement('div');
            content.className = 'message-content';
            content.textContent = message.content;

            box.appendChild(sender);
            box.appendChild(time);
            box.appendChild(content);
            return box;
        }

        function loadAnnouncement() {
            fetch('/announce')
                .then(res => res.text())
                .then(text => {
                    const annc = document.getElementById('ann');
                    annc.innerHTML = '';
                    if (!text || text.trim() === '') {
                        annc.innerHTML = '<div class="no-announcement">暂无公告</div>';
                        return;
                    }
                    try {
                        const ann = JSON.parse(text);
                        if (ann.content && ann.content.trim() !== '') {
                            annc.innerHTML = `<div class="announcement-message"><strong>${ann.sender || '系统'}</strong> ${ann.time ? `(${ann.time})` : ''}: ${ann.content}</div>`;
                        } else {
                            annc.innerHTML = '<div class="no-announcement">暂无公告</div>';
                        }
                    } catch (e) {
                        if (text.trim() !== '') {
                            annc.innerHTML = `<div class="announcement-message"><strong>系统</strong>: ${text}</div>`;
                        } else {
                            annc.innerHTML = '<div class="no-announcement">暂无公告</div>';
                        }
                    }
                })
                .catch(() => document.getElementById('ann').innerHTML = '<div class="no-announcement">暂无公告</div>');
        }

        function showError(msg) {
            const err = document.getElementById('errorMessage');
            err.textContent = msg;
            err.style.display = 'block';
            setTimeout(() => err.style.display = 'none', 3000);
        }

        function showSuccess(msg) {
            const suc = document.getElementById('successMessage');
            suc.textContent = msg;
            suc.style.display = 'block';
            setTimeout(() => suc.style.display = 'none', 3000);
        }

        // 把原有函数挂载到全局，确保事件调用有效
        window.deleteMessage = deleteMessage;
        window.joinCurrentChat = joinCurrentChat;
    })();
</script>
</body>
</html>
